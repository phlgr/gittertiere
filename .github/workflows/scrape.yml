name: Daily Gittertier Scrape

on:
  schedule:
    # Run once daily at 06:00 UTC (08:00 CEST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scraper
        run: bun run apps/scraper/src/index.ts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
          git push
